<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0F" />

    <!-- SEO Meta Tags -->
    <title>Norman Martínez | Ingeniero en Sistemas & Desarrollador Web</title>
    <meta name="description" content="Portafolio de Norman Martínez — Ingeniero en Sistemas. Diseño soluciones digitales claras: sitios y aplicaciones web con React, TypeScript y Laravel, del concepto al producto." />
    <link rel="canonical" href="https://portafolio-nsma-dev.vercel.app/" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portafolio-nsma-dev.vercel.app/" />
    <meta property="og:site_name" content="nsma.dev" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:title" content="Norman Martínez | Ingeniero en Sistemas & Desarrollador Web" />
    <meta property="og:description" content="Diseño soluciones digitales claras: sitios y aplicaciones web con React, TypeScript y Laravel, del concepto al producto." />
    <meta property="og:image" content="https://portafolio-nsma-dev.vercel.app/og-image.webp" />
    <meta property="og:image:alt" content="Portafolio de Norman Martínez — nsma.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Norman Martínez | Ingeniero en Sistemas & Desarrollador Web" />
    <meta name="twitter:description" content="Diseño soluciones digitales claras: sitios y aplicaciones web con React, TypeScript y Laravel." />
    <meta name="twitter:image" content="https://portafolio-nsma-dev.vercel.app/og-image.webp" />

    <!-- Font Optimization: Preconnect and load via link to avoid @import blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Sora:wght@400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <meta name="referrer" content="no-referrer" />
  </head>
  <body>
    <!-- small early script moved to public/theme-init.js to be allowed by CSP 'self' -->
    <script src="/theme-init.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- helper to make image downloads slightly harder (client-side only) -->
    <script src="/protect-images.js" defer></script>
  </body>
</html>
